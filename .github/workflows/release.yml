name: Release
on:
  push:
    tags:
    - '*'
    branches:
    - main
    - release**
    paths-ignore:
      - '**.md'
      - '**.rst'
  pull_request:
    paths-ignore:
      - '**.md'
      - '**.rst'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  id-token: write

jobs:
  release:
    name: Deploy release to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          allow-prereleases: true
          cache: 'pip'
      - name: Install dependencies
        run: pip install -U pip hatch
      - name: Build distributions
        run: hatch build
      - name: Upload package as artifact to GitHub
        if: github.repository == 'mesa/mesa' && startsWith(github.ref, 'refs/tags')
        uses: actions/upload-artifact@v7
        with:
          name: package
          path: dist/
      - name: Publish package to PyPI
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
        uses: pypa/gh-action-pypi-publish@release/v1

  update-switcher:
    name: Update docs version switcher
    runs-on: ubuntu-latest
    needs: release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags') && !contains(github.ref, 'a') && !contains(github.ref, 'b') && !contains(github.ref, 'rc')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          allow-prereleases: true
      - name: Update switcher.json
        run: python docs/_static/update_switcher.py ${{ github.ref_name }}
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/_static/switcher.json
          git commit -m "Update switcher.json for ${{ github.ref_name }}"
          git push
